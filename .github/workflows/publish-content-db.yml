name: Publish Content SQLite

on:
  workflow_dispatch:
    inputs:
      db_version:
        description: "DB version label (YYYY-MM-DD). Leave blank to use today's UTC date."
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish-content-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SQLite and manifest
        shell: bash
        run: |
          set -euo pipefail
          DB_VERSION="${{ github.event.inputs.db_version }}"
          if [ -z "${DB_VERSION}" ]; then
            DB_VERSION="$(date -u +%F)"
          fi

          mkdir -p artifacts
          npm run build:content-sqlite -- \
            --seed data/content-seed.json \
            --out artifacts/content.sqlite \
            --manifest-out artifacts/content-manifest.json \
            --manifest-url /data/content.sqlite \
            --download-url https://github.com/emsidev/branham-sermon-search/releases/latest/download/content.sqlite \
            --db-version "${DB_VERSION}"

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: content-manifest
          path: artifacts/content-manifest.json
          if-no-files-found: error

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: content-db
          name: Content DB
          make_latest: true
          files: artifacts/content.sqlite
          overwrite_files: true
